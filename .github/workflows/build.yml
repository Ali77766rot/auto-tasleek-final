name: Android APK Build
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Project
        run: |
          # فك الضغط مباشرة في المجلد الحالي
          unzip -o -q AutoTasleek_New.zip
          
          # البحث عن ملف gradlew والذهاب لمكانه
          FILE_PATH=$(find . -name "gradlew" | head -n 1)
          PROJECT_DIR=$(dirname "$FILE_PATH")
          
          echo "تم العثور على المشروع في: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          
          # إعطاء صلاحية التنفيذ والبناء
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Generated APK
        uses: actions/upload-artifact@v4
        with:
          name: Auto-Tasleek-APK
          path: "**/app/build/outputs/apk/debug/*.apk"
